name: SEO Check
permissions:
  contents: read

on:
  workflow_dispatch:
  repository_dispatch:
    types: [azure-pipeline-complete]

jobs:
  seo-crawl:
    runs-on: ubuntu-latest
    # Avoid overlapping agent crawls when Azure dispatches back-to-back.
    concurrency:
      group: seo-crawl-blog-dev
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout build commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.commit_sha || github.sha }}
          fetch-depth: 2

      - name: Resolve baseline commit
        id: baseline
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "sha=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi

      # Azure repository_dispatch runs as soon as Helm --wait returns; blog-dev ingress/CDN
      # can lag behind the cluster (same pattern as Pa11y readiness in azure-pipelines.yml).
      - name: Wait for blog-dev sitemap
        if: github.event_name == 'repository_dispatch'
        run: |
          set -euo pipefail
          url="https://blog-dev.funkysi1701.com/sitemap.xml"
          for i in $(seq 1 36); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
            if [ "$code" = "304" ]; then
              echo "blog-dev sitemap ready (HTTP 304) on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}: HTTP ${code:-curl-failed}; retrying in 10s..."
            sleep 10
          done
          echo "blog-dev sitemap did not return HTTP 304 within ~6 minutes"
          exit 0

      - name: Run Signal Diff crawl
        id: signal_diff
        uses: funkysi1701/signal-diff-action@v1.6
        with:
          api_base_url: ${{ secrets.SIGNALDIFF_API_BASE_URL }}
          api_key: ${{ secrets.SIGNALDIFF_CI_API_KEY }}
          sitemap_url: https://blog-dev.funkysi1701.com/sitemap.xml
          fail_mode: none
          execution_mode: agent
          comment_on_pr: false
          collect_code_changes: true
          commit_sha: ${{ github.event.client_payload.commit_sha || github.sha }}
          ref_name: ${{ github.event.client_payload.ref_name || github.ref }}
          baseline_ref: ${{ steps.baseline.outputs.sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
