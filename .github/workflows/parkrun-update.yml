name: Update parkrun results

on:
  workflow_dispatch:
  schedule:
    - cron: "20 11 * * 6"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: [self-hosted, k8s]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: develop
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r scripts/requirements-parkrun.txt

      - name: Refresh parkrun markdown
        run: |
          python scripts/update_parkrun_results.py
          ec=$?
          if [ "$ec" -eq 2 ]; then
            echo "::notice title=Parkrun update skipped::parkrun.org.uk blocked this runner. Run \`python scripts/update_parkrun_results.py\` locally and commit, or use a self-hosted runner."
            exit 0
          fi
          exit "$ec"

      - name: Commit and open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/parkrun.md
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          BRANCH="chore/parkrun-results-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "chore: refresh parkrun results"
          git push -u origin "$BRANCH"
          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: refresh parkrun results" \
            --body "Automated update of \`content/parkrun.md\` from \`scripts/update_parkrun_results.py\`. Merge to refresh the live site on the usual develop → main path."
