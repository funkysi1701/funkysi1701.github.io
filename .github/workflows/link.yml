name: Broken link check
permissions:
  contents: read

on:
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:

jobs:
  broken_link_checker_job:
    runs-on: ubuntu-latest
    name: Check for broken links
    timeout-minutes: 120
    steps:
      - name: Broken Link Checker Action
        uses: technote-space/broken-link-checker-action@7820497a025fb09ff736ee11bb8bb12ca715b4fe # v2.3.1
        with:
          # SiteChecker follows internal links site-wide from this entry URL (no hand-maintained URL list).
          TARGET: https://www.funkysi1701.com
          RECURSIVE: true
