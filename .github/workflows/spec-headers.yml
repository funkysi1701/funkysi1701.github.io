name: Playwright spec headers

permissions:
  contents: read

on:
  push:
    paths:
      - 'tests/**/*.spec.ts'
      - 'scripts/check_spec_headers.mjs'
      - 'package.json'
      - '.github/workflows/spec-headers.yml'
  pull_request:
    paths:
      - 'tests/**/*.spec.ts'
      - 'scripts/check_spec_headers.mjs'
      - 'package.json'
      - '.github/workflows/spec-headers.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: [self-hosted, k8s]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: "Check Playwright // spec: headers"
        run: npm run check:spec-headers
