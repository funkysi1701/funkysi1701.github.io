name: Playwright spec headers

permissions:
  contents: read

on:
  push:
    paths:
      - 'tests/**/*.spec.ts'
      - 'scripts/check_spec_headers.mjs'
      - 'package.json'
      - '.github/workflows/spec-headers.yml'
  pull_request:
    paths:
      - 'tests/**/*.spec.ts'
      - 'scripts/check_spec_headers.mjs'
      - 'package.json'
      - '.github/workflows/spec-headers.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check Playwright // spec: headers
        run: npm run check:spec-headers
