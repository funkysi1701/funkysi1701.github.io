name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install parkrun script dependencies
        run: pip install -r scripts/requirements-parkrun.txt

      - name: Refresh parkrun markdown (requires internet access available in setup steps)
        continue-on-error: true
        run: python scripts/update_parkrun_results.py

      # After editing post title/description front matter, agents should run: npm run check:meta
      - name: Verify meta validation npm scripts
        run: npm run check:meta

      # No build step needed - tests run against live site at www.funkysi1701.com
