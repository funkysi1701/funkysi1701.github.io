name: Deploy to Production

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    name: Build and deploy production SWA
    uses: ./.github/workflows/reusable-hugo-swa-deploy.yml
    with:
      hugo_environment: production
      github_environment: Prod
    secrets:
      azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_PEBBLE_0B8F90E03 }}

  seo-crawl:
    needs: deploy-prod
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Run Signal Diff crawl
        uses: funkysi1701/signal-diff-action@v1.10
        with:
          api_base_url: ${{ secrets.SIGNALDIFF_API_BASE_URL }}
          api_key: ${{ secrets.SIGNALDIFF_CI_API_KEY }}
          sitemap_url: ${{ vars.SIGNALDIFF_DEFAULT_SITEMAP_URL }}
          fail_mode: none
          comment_on_pr: true
          collect_code_changes: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
