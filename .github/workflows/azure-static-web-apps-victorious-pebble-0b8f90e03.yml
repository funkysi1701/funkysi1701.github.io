name: Deploy to Production
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '5 20 * * 1'
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: main
          submodules: true

      - name: Load Hugo Version
        run: |
          echo "HUGO_VERSION=$(grep HUGO_VERSION .env | cut -d '=' -f2)" >> $GITHUB_ENV

      - name: Build Hugo Site
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -w /src \
            -u $(id -u):$(id -g) \
            floryn90/hugo:${HUGO_VERSION}-ext-alpine \
            --minify --environment production --noBuildLock

      - name: Copy staticwebapp.config.json to public
        run: |
          cp staticwebapp.config.json public/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_PEBBLE_0B8F90E03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "public"
          api_location: ""
          output_location: ""
          skip_app_build: true
