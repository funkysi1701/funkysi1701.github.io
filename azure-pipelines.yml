---
variables:
  - group: Global
  - name: Build.Number.Major
    value: 10
  - name: Build.Number.Minor
    value: 1
  - name: Build.Number.Sub
    value: 1
  - name: BuildNumber
    value: $(Build.BuildNumber)

name: $(Build.Number.Major).$(Build.Number.Minor).$(Build.Number.Sub).$(Rev:r)

trigger:
  batch: true
  branches:
    include:
      - develop
      - main

# Nightly accessibility: full sitemap, axe + htmlcs (no image rebuild or Helm deploy).
schedules:
  - cron: "0 2 * * *"
    displayName: Nightly full Pa11y (axe + htmlcs, all URLs)
    branches:
      include:
        - main
    always: true

pool: Docker

steps:
- checkout: self
  # Playwright Docker steps below can leave root-owned node_modules/coverage on the self-hosted agent.
  clean: false

- task: CmdLine@2
  displayName: "Install AWS CLI"
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), or(in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  inputs:
    script: |
      set -euo pipefail
      export PATH="$HOME/.local/bin:$PATH"
      if command -v aws >/dev/null 2>&1; then
        echo "AWS CLI already installed: $(aws --version)"
        exit 0
      fi
      rm -f awscliv2.zip
      curl -fSL --connect-timeout 30 --max-time 600 \
        "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      unzip -q awscliv2.zip
      ./aws/install --bin-dir "$HOME/.local/bin" --install-dir "$HOME/.local/aws-cli" --update
      if [ -d "$HOME/.local/aws-cli/v2" ]; then
        cd "$HOME/.local/aws-cli/v2"
        ls -1 | sort -V | head -n -2 | xargs -r rm -rf
      fi
      export PATH="$HOME/.local/bin:$PATH"
      aws --version
      rm -f awscliv2.zip
- task: CmdLine@2
  displayName: "Build and Login to ECR"
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), or(in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_DEFAULT_REGION: eu-north-1
  inputs:
    script: |
      export PATH=$HOME/.local/bin:$PATH
      HUGO_VERSION=$(grep '^HUGO_VERSION=' .env | cut -d '=' -f2)
      docker build --build-arg HUGO_VERSION=$HUGO_VERSION -t blog .
      aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 687611153768.dkr.ecr.eu-north-1.amazonaws.com
- bash: |
    case "$(Build.SourceBranchName)" in
      main)
        echo "##vso[task.setvariable variable=imageRepoName]blog:$(Build.BuildNumber)-main"
        ;;
      develop)
        echo "##vso[task.setvariable variable=imageRepoName]blog:$(Build.BuildNumber)-develop"
        ;;
      *)
        echo "##vso[task.setvariable variable=imageRepoName]blog:$(Build.BuildNumber)-develop"
        ;;
    esac
  displayName: 'Set image repository name'
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'))
- task: CmdLine@2
  displayName: "Publish to ECR"
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), or(in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  inputs:
    script: |
      docker tag blog 687611153768.dkr.ecr.eu-north-1.amazonaws.com/funkysi1701/$(imageRepoName)
      docker push 687611153768.dkr.ecr.eu-north-1.amazonaws.com/funkysi1701/$(imageRepoName)

- task: Kubernetes@1
  displayName: 'Kubernetes Login'
  inputs:
    connectionType: Kubernetes Service Connection
    kubernetesServiceEndpoint: kubernetes
    command: 'login'     
- script: |
    helm lint Helm/blog --namespace develop
    helm lint Helm/blog --namespace test
    helm lint Helm/blog --namespace main
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'))
# Non-prod: feature/* → develop namespace only. develop → develop + test Kubernetes namespaces (same image tag).
# --wait/--timeout: block until workloads ready; --atomic: auto-rollback release if upgrade fails.
- script: |
    helm upgrade --install blog ./Helm/blog --namespace develop \
      --set image.tag=$(Build.BuildNumber)-develop \
      --wait --timeout 15m --atomic
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), or(eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  displayName: 'helm upgrade blog (namespace develop)'
- script: |
    helm upgrade --install blog ./Helm/blog --namespace test \
      --set image.tag=$(Build.BuildNumber)-develop \
      --wait --timeout 15m --atomic
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), eq(variables['Build.SourceBranchName'], 'develop'))
  displayName: 'helm upgrade blog (namespace test)'
- script: |
    helm upgrade --install blog ./Helm/blog --namespace main \
      --set image.tag=$(Build.BuildNumber)-main \
      --wait --timeout 15m --atomic
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), eq(variables['Build.SourceBranchName'], 'main'))
  displayName: 'helm upgrade blog (namespace main / prod)'  
- bash: |
    set -euo pipefail
    SITEMAP_URL="https://blog-dev.funkysi1701.com/sitemap.xml"
    READY=0
    for i in $(seq 1 36); do
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SITEMAP_URL" || echo "000")
      if [ "$HTTP_CODE" = "200" ]; then
        echo "blog-dev sitemap ready (HTTP 200) on attempt $i"
        READY=1
        break
      fi
      echo "Attempt $i: HTTP $HTTP_CODE; retrying in 10s..."
      sleep 10
    done
    if [ "$READY" -ne 1 ]; then
      echo "##vso[task.logissue type=warning]blog-dev sitemap did not return HTTP 200 within ~6 minutes; running Playwright anyway."
    fi
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), or(eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  displayName: 'Wait for blog-dev after deploy'
- task: PowerShell@2
  displayName: 'Notify GitHub (repository_dispatch: azure-pipeline-complete)'
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), or(in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  env:
    GITHUB_TOKEN: $(GITHUB_TOKEN)
  inputs:
    targetType: inline
    script: |
      # blog-dev is not reachable from GitHub-hosted runners (curl HTTP 000 there).
      # Wait here on the pipeline agent before dispatching the SEO workflow.
      $sitemapUrl = "https://blog-dev.funkysi1701.com/sitemap.xml"
      $ready = $false
      for ($i = 1; $i -le 36; $i++) {
        try {
          $resp = Invoke-WebRequest -Uri $sitemapUrl -Method Get -UseBasicParsing -TimeoutSec 30
          if ($resp.StatusCode -eq 200) {
            Write-Host "blog-dev sitemap ready (HTTP 200) on attempt $i"
            $ready = $true
            break
          }
          Write-Host "Attempt ${i}: HTTP $($resp.StatusCode); retrying in 10s..."
        } catch {
          Write-Host "Attempt ${i}: $($_.Exception.Message); retrying in 10s..."
        }
        Start-Sleep -Seconds 10
      }
      if (-not $ready) {
        Write-Host "##vso[task.logissue type=warning]blog-dev sitemap did not return HTTP 200 within ~6 minutes; dispatching SEO Check anyway."
      }

      $body = @{
        event_type = "azure-pipeline-complete"
        client_payload = @{
          commit_sha = "$(Build.SourceVersion)"
          ref_name = "$(Build.SourceBranch)"
        }
      } | ConvertTo-Json -Depth 5

      Invoke-RestMethod `
        -Uri "https://api.github.com/repos/funkysi1701/funkysi1701.github.io/dispatches" `
        -Method Post `
        -ContentType "application/json" `
        -Headers @{
          Authorization = "Bearer $env:GITHUB_TOKEN"
          Accept = "application/vnd.github+json"
          "X-GitHub-Api-Version" = "2022-11-28"
        } `
        -Body $body  
- task: CmdLine@2
  displayName: 'Playwright E2E (blog-dev)'
  condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'), or(eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  env:
    CODECOV_TOKEN: $(CODECOV_TOKEN)
  inputs:
    script: |
      set -euo pipefail
      # Root-owned node_modules from a prior Docker run breaks npm ci as the agent user.
      sudo rm -rf "$(Build.SourcesDirectory)/node_modules" "$(Build.SourcesDirectory)/coverage" "$(Build.SourcesDirectory)/codecov" 2>/dev/null \
        || rm -rf "$(Build.SourcesDirectory)/node_modules" "$(Build.SourcesDirectory)/coverage" "$(Build.SourcesDirectory)/codecov" 2>/dev/null \
        || true
      docker run --rm \
        -v "$(Build.SourcesDirectory):/work" \
        -w /work \
        -e BASE_URL=https://blog-dev.funkysi1701.com \
        -e CI=true \
        -e CODECOV_TOKEN \
        mcr.microsoft.com/playwright:v1.59.1-jammy \
        bash -lc 'set -euo pipefail
          rm -rf node_modules coverage codecov
          npm ci
          npx playwright install chromium
          npx playwright test
          node scripts/generate-page-coverage.js
          if [ -n "${CODECOV_TOKEN:-}" ]; then
            curl -sSfL https://uploader.codecov.io/latest/linux/codecov -o codecov
            chmod +x codecov
            ./codecov -t "$CODECOV_TOKEN" -f ./coverage/page-coverage.lcov -F page-coverage -n page-coverage || true
          fi
          rm -rf node_modules coverage codecov'

- task: CmdLine@2
  displayName: 'Pa11y Accessibility Check (nightly only)'
  condition: and(succeeded(), eq(variables['Build.Reason'], 'Schedule'))
  continueOnError: true
  env:
    GITHUB_TOKEN: $(GITHUB_TOKEN)
  inputs:
    script: |
      PA11Y_RUN_FAILED=0
      REPO_ROOT="$(Build.SourcesDirectory)"

      # Pa11y runs only on scheduled nightly builds (see schedules:); scan production.
      # Nightly: axe+htmlcs, full sitemap — optional PA11Y_NIGHTLY_MAX_PAGES cap.
      SITE_URL="https://www.funkysi1701.com"
      # Helm release "blog" + chart name "blog" → Deployment name "blog" in namespace main.
      if ! kubectl rollout status deployment/blog -n main --timeout=5m; then
        echo "##vso[task.logissue type=warning]kubectl rollout status did not succeed within 5m; continuing with HTTP check."
      fi
      # Public URL (ingress/CDN) may lag behind Deployment ready.
      READY_URL="${SITE_URL}/"
      READY=0
      for i in $(seq 1 36); do
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$READY_URL")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "Public URL ready (HTTP 200): $READY_URL"
          READY=1
          break
        fi
        echo "Attempt $i: received HTTP $HTTP_CODE from $READY_URL; retrying in 5s..."
        sleep 5
      done
      if [ "$READY" -ne 1 ]; then
        echo "##vso[task.logissue type=warning]No HTTP 200 from $READY_URL after ~180s; running Pa11y anyway."
      fi

      echo "Pa11y scanning all sitemap URLs under: $SITE_URL (sitemap: ${SITEMAP_URL:-$SITE_URL/sitemap.xml})"

      PA11Y_RUNNERS_VAL="${PA11Y_NIGHTLY_RUNNERS:-axe,htmlcs}"
      PA11Y_MAX_PAGES_VAL="${PA11Y_NIGHTLY_MAX_PAGES:-}"
      echo "Nightly scheduled run: PA11Y_RUNNERS=$PA11Y_RUNNERS_VAL; PA11Y_MAX_PAGES (empty=all)=${PA11Y_MAX_PAGES_VAL:-<full sitemap>}"

      # Speed tuning (Azure variable group or pipeline variables):
      #   PA11Y_NIGHTLY_RUNNERS — default axe,htmlcs
      #   PA11Y_NIGHTLY_MAX_PAGES — optional cap (unset = full sitemap)
      #   PA11Y_WAIT_MS       — post-load wait per page (JSON default 2000).
      #   PA11Y_TIMEOUT_MS    — per-page nav timeout (JSON default 90000).
      #   PA11Y_THEMES        — optional: light,dark or one of them (default light,dark). Each sitemap URL is scanned per theme via #modeSwitcher.
      # Bookworm node image lacks Chromium libs; use apt Chromium (scripts/pa11y-pipeline.json).
      # Host captures Docker stdout → pa11y-results.json. Only the final JSON may go to
      # stdout (npm/apt must not — e.g. "added 124 packages" breaks JSON.parse).
      set +e
      docker run --rm --cap-add=SYS_ADMIN --shm-size=2g \
        -e "SITE_URL=$SITE_URL" \
        -e "SITEMAP_URL=${SITEMAP_URL:-}" \
        -e "PA11Y_MAX_PAGES=$PA11Y_MAX_PAGES_VAL" \
        -e "PA11Y_RUNNERS=$PA11Y_RUNNERS_VAL" \
        -e "PA11Y_WAIT_MS=${PA11Y_WAIT_MS:-}" \
        -e "PA11Y_TIMEOUT_MS=${PA11Y_TIMEOUT_MS:-}" \
        -e "PA11Y_THEMES=${PA11Y_THEMES:-light,dark}" \
        -v "$REPO_ROOT/scripts:/scripts:ro" \
        node:20-bookworm \
        bash -c 'set -e
          export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
          export PUPPETEER_SKIP_DOWNLOAD=true
          apt-get update -qq >/dev/null
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends chromium ca-certificates fonts-liberation >/dev/null
          cp -a /scripts/pa11y-sitemap /tmp/pa11y-sitemap-work
          cp /scripts/pa11y-pipeline.json /tmp/pa11y.json
          cd /tmp/pa11y-sitemap-work
          npm ci --omit=dev --silent >/dev/null
          export PA11Y_CONFIG=/tmp/pa11y.json
          set +e
          node scan.mjs > /tmp/pa11y-out.json
          code=$?
          cat /tmp/pa11y-out.json
          exit $code' \
        > pa11y-results.json 2>pa11y-error.log
      PA11Y_EXIT=$?
      set -e

      # Exit code 0 = no issues, 2 = issues found — both are valid JSON results.
      # Any other exit code means Pa11y/Chromium failed.
      if [ "$PA11Y_EXIT" -ne 0 ] && [ "$PA11Y_EXIT" -ne 2 ]; then
        echo "##vso[task.logissue type=error]Pa11y failed with exit code $PA11Y_EXIT (see pa11y-error.log in logs)."
        echo "Pa11y failed with exit code $PA11Y_EXIT"
        cat pa11y-error.log || true
        echo "[]" > pa11y-results.json
        PA11Y_RUN_FAILED=1
      fi

      # Create GitHub issues for any new accessibility violations found.
      # Use bare -e GITHUB_TOKEN so Docker copies from the agent env (avoids shell mangling PAT characters).
      docker run --rm \
        -v "$REPO_ROOT/pa11y-results.json:/app/pa11y-results.json:ro" \
        -v "$REPO_ROOT/scripts:/app/scripts:ro" \
        -e GITHUB_TOKEN \
        -e BUILD_NUMBER="$(Build.BuildNumber)" \
        -e PA11Y_RUN_FAILED="$PA11Y_RUN_FAILED" \
        -e SITE_URL="$SITE_URL" \
        node:20-alpine \
        node /app/scripts/create-accessibility-issues.js

- task: CmdLine@2
  displayName: 'Fail build if site was unreachable during Pa11y'
  condition: and(succeededOrFailed(), eq(variables['Build.Reason'], 'Schedule'))
  inputs:
    script: |
      if grep -q 'ERR_CONNECTION_REFUSED' pa11y-error.log 2>/dev/null; then
        echo "##vso[task.logissue type=error]Site was unreachable during Pa11y accessibility check (ERR_CONNECTION_REFUSED). The site may not have deployed successfully."
        exit 1
      fi
