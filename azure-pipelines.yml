---
variables:
  - group: Global
  - name: Build.Number.Major
    value: 10
  - name: Build.Number.Minor
    value: 1
  - name: Build.Number.Sub
    value: 1
  - name: BuildNumber
    value: $(Build.BuildNumber)

name: $(Build.Number.Major).$(Build.Number.Minor).$(Build.Number.Sub).$(Rev:r)

trigger:
- develop
- test
- main

pool: Docker

steps:
- task: CmdLine@2
  displayName: "Install AWS CLI"
  condition: and(succeeded(), or(in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop', 'refs/heads/test'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  inputs:
    script: |
      curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      unzip -q awscliv2.zip
      ./aws/install --bin-dir ~/.local/bin --install-dir ~/.local/aws-cli --update
      export PATH=$HOME/.local/bin:$PATH
      aws --version
- task: CmdLine@2
  displayName: "Build and Login to ECR"
  condition: and(succeeded(), or(in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop', 'refs/heads/test'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_DEFAULT_REGION: eu-north-1
  inputs:
    script: |
      export PATH=$HOME/.local/bin:$PATH
      HUGO_VERSION=$(grep '^HUGO_VERSION=' .env | cut -d '=' -f2)
      docker build --build-arg HUGO_VERSION=$HUGO_VERSION -t blog .
      aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 687611153768.dkr.ecr.eu-north-1.amazonaws.com
- bash: |
    case "$(Build.SourceBranchName)" in
      "main")
        echo "##vso[task.setvariable variable=imageRepoName]blog:$(Build.BuildNumber)-main"
        ;;
      "test")
        echo "##vso[task.setvariable variable=imageRepoName]blog:$(Build.BuildNumber)-test"
        ;;
      "develop")
        echo "##vso[task.setvariable variable=imageRepoName]blog:$(Build.BuildNumber)-develop"
        ;;
      *)
        echo "##vso[task.setvariable variable=imageRepoName]blog:$(Build.BuildNumber)-develop"
        ;;
    esac
  displayName: 'Set image repository name'
- task: CmdLine@2
  displayName: "Publish to ECR"
  condition: and(succeeded(), or(in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop', 'refs/heads/test'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  inputs:
    script: |
      docker tag blog 687611153768.dkr.ecr.eu-north-1.amazonaws.com/funkysi1701/$(imageRepoName)
      docker push 687611153768.dkr.ecr.eu-north-1.amazonaws.com/funkysi1701/$(imageRepoName)

- task: Kubernetes@1
  displayName: 'Kubernetes Login'
  inputs:
    connectionType: Kubernetes Service Connection
    kubernetesServiceEndpoint: kubernetes
    command: 'login'     
- script: |
    helm lint Helm/blog --namespace develop
    helm lint Helm/blog --namespace test
    helm lint Helm/blog --namespace main
- script: |
    helm upgrade --install blog ./Helm/blog --namespace develop --set image.tag=$(Build.BuildNumber)-develop
  condition: and(succeeded(), or(eq(variables['Build.SourceBranchName'], 'develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')))
  displayName: 'helm upgrade blog Dev'
- script: |
    helm upgrade --install blog ./Helm/blog --namespace test --set image.tag=$(Build.BuildNumber)-test
  condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'test'))  
  displayName: 'helm upgrade blog Test'
- script: |
    helm upgrade --install blog ./Helm/blog --namespace main --set image.tag=$(Build.BuildNumber)-main
  condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'main'))  
  displayName: 'helm upgrade blog Main'
- bash: |
    if [[ true ]]; then
      echo "##vso[task.setvariable variable=runPa11y]true"
    else
      echo "##vso[task.setvariable variable=runPa11y]false"
    fi
  displayName: 'Set runPa11y flag'
- task: CmdLine@2
  displayName: 'Pa11y Accessibility Check'
  condition: and(succeeded(), eq(variables['runPa11y'], 'true'))
  continueOnError: true
  env:
    GITHUB_TOKEN: $(GITHUB_TOKEN)
  inputs:
    script: |
      # Allow 30 seconds for the Kubernetes rollout to finish before scanning
      sleep 30

      PA11Y_RUN_FAILED=0
      REPO_ROOT="$(Build.SourcesDirectory)"

      # Determine the site URL to scan based on the branch being built.
      case "$(Build.SourceBranchName)" in
        "main")
          SITE_URL="https://blog.funkysi1701.com"
          ;;
        "test")
          SITE_URL="https://blog-test.funkysi1701.com"
          ;;
        *)
          SITE_URL="https://www.funkysi1701.com"
          ;;
      esac
      echo "Pa11y scanning: $SITE_URL"

      # Bookworm node image lacks Chromium libs; use apt Chromium and point Pa11y at it (scripts/pa11y-pipeline.json).
      # Host redirects ALL container stdout into pa11y-results.json — apt/dpkg print "Selecting..." on stdout; silence it.
      # Pa11y JSON is emitted only via cat /tmp/pa11y-out.json (Pa11y exit 2 = issues found — must still cat after pa11y).
      set +e
      docker run --rm --cap-add=SYS_ADMIN --shm-size=2g \
        -v "$REPO_ROOT/scripts/pa11y-pipeline.json:/tmp/pa11y.json:ro" \
        node:20-bookworm \
        bash -c 'set -e
          export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
          apt-get update -qq >/dev/null
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends chromium ca-certificates fonts-liberation >/dev/null
          npm install -g pa11y >/dev/null 2>&1
          set +e
          pa11y --runner axe --runner htmlcs --reporter json --config /tmp/pa11y.json '"$SITE_URL"' > /tmp/pa11y-out.json
          code=$?
          cat /tmp/pa11y-out.json
          exit $code' \
        > pa11y-results.json 2>pa11y-error.log
      PA11Y_EXIT=$?
      set -e

      # Exit code 0 = no issues, 2 = issues found — both are valid JSON results.
      # Any other exit code means Pa11y/Chromium failed.
      if [ "$PA11Y_EXIT" -ne 0 ] && [ "$PA11Y_EXIT" -ne 2 ]; then
        echo "##vso[task.logissue type=error]Pa11y failed with exit code $PA11Y_EXIT (see pa11y-error.log in logs)."
        echo "Pa11y failed with exit code $PA11Y_EXIT"
        cat pa11y-error.log || true
        echo "[]" > pa11y-results.json
        PA11Y_RUN_FAILED=1
      fi

      # Create GitHub issues for any new accessibility violations found.
      # Use bare -e GITHUB_TOKEN so Docker copies from the agent env (avoids shell mangling PAT characters).
      docker run --rm \
        -v "$REPO_ROOT/pa11y-results.json:/app/pa11y-results.json:ro" \
        -v "$REPO_ROOT/scripts:/app/scripts:ro" \
        -e GITHUB_TOKEN \
        -e BUILD_NUMBER="$(Build.BuildNumber)" \
        -e PA11Y_RUN_FAILED="$PA11Y_RUN_FAILED" \
        -e SITE_URL="$SITE_URL" \
        node:20-alpine \
        node /app/scripts/create-accessibility-issues.js
- task: CmdLine@2
  displayName: 'Fail build if site was unreachable during Pa11y'
  condition: and(succeeded(), eq(variables['runPa11y'], 'true'))
  inputs:
    script: |
      if grep -q 'ERR_CONNECTION_REFUSED' pa11y-error.log 2>/dev/null; then
        echo "##vso[task.logissue type=error]Site was unreachable during Pa11y accessibility check (ERR_CONNECTION_REFUSED). The site may not have deployed successfully."
        exit 1
      fi
